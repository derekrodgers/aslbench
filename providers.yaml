providers:
  - id: copilot
    type: copilot_sdk
    label: "GitHub Copilot"
  - id: anthropic
    type: anthropic
    label: "Anthropic API"
    api_key_env: ANTHROPIC_API_KEY
  - id: openai
    type: openai_compatible
    label: "OpenAI API"
    base_url: "https://api.openai.com/v1"
    api_key_env: OPENAI_API_KEY
  - id: lmstudio
    type: openai_compatible
    label: "LM Studio (local)"
    base_url: "http://localhost:1234/v1"
    api_key_env: null
  - id: omlx
    type: openai_compatible
    label: "oMLX (local)"
    base_url: "http://127.0.0.1:8000/v1"
    api_key_env: null
    extra:
      extra_body:
        chat_template_kwargs:
          enable_thinking: false
    # extra.max_tokens overrides the default (16 384).  Thinking models stream
    # their full reasoning trace into message.content and need generous headroom.
    #
    # extra.extra_body passes arbitrary fields into the chat-completions request
    # body, which lets you control thinking behaviour without code changes.
    #
    # Disable thinking entirely (oMLX / vLLM with Qwen3):
    #   extra:
    #     extra_body:
    #       chat_template_kwargs:
    #         enable_thinking: false
    #
    # Cap thinking tokens (keeps reasoning but limits length):
    #   extra:
    #     max_tokens: 8192
    #     extra_body:
    #       thinking:
    #         type: enabled
    #         budget_tokens: 1024
    #
    # The exact key depends on the server.  Check oMLX / vLLM docs for your
    # model.  If the server ignores unknown fields the run will still work.
